# RockTouch V1 - shield settings.
# Target board: nice!nano v2 (NRF52840). BLE/USB is enabled in the default Kconfig of the board.

# Sleep / battery saving
CONFIG_ZMK_SLEEP=y
# Sleep timeout (ms). 15 minutes = 900000.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# BLE
CONFIG_BT_DEVICE_NAME="RockTouch"

# Input
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_I2C=y
